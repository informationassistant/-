<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ИнфоПомощник: 5-11 класс</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💻 ИнфоПомощник</h1>
            <p>База знаний по информатике (5-11 класс)</p>
        </header>

        <main>
            <div class="chat-container" id="chatContainer">
                <div class="message bot">Привет! Я помогу тебе с теорией. Спроси меня о чем угодно (например: "Что такое бит?", "Алгоритм", "Массив" или "Системы счисления").</div>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Напишите ваш вопрос здесь...">
                <button onclick="askQuestion()">Спросить</button>
            </div>
        </main>

        <nav class="quick-links">
            
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
